name: Build Feeds

on:
  schedule:
    - cron: '17 19 * * 1-5'  # 2:17 PM CT (CDT = UTC-5), Mon-Fri
    - cron: '17 22 * * 1-5'  # 5:17 PM CT (CDT = UTC-5), Mon-Fri
    - cron: '16 23 * * 1-5'  # 6:16 PM CT (CDT = UTC-5), Mon-Fri
    - cron: '30 00 * * 2-6'  # 7:30 PM CT (CDT = UTC-5), Mon-Fri (next UTC day)
  workflow_dispatch:  # Allow manual runs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run build_feeds.py (attempt 1)
        run: python build_feeds.py

      - name: Wait 2 minutes before retry
        run: sleep 120

      - name: Run build_feeds.py (attempt 2)
        run: python build_feeds.py

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --staged --quiet || git commit -m "Update feeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
