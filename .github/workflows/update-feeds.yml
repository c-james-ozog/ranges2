name: Update Feeds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build
        run: python -m src.build_feeds

      - name: Commit feeds
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feeds/
          git commit -m "update feeds" || echo "no changes"
          git push
