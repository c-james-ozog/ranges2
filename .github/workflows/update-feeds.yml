name: Update Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "15 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Prepare folders
        run: |
          mkdir -p feeds
          mkdir -p feeds/history
          mkdir -p feeds/cache

      - name: Run feed build
        env:
          TZ: America/Chicago
        run: |
          if [ -f build_feeds.py ]; then
            python build_feeds.py
          elif [ -f src/build_feeds.py ]; then
            python src/build_feeds.py
          else
            echo "Could not find build_feeds.py"
            exit 1
          fi

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add feeds/

          if git diff --cached --quiet; then
            echo "No feed changes to commit"
            exit 0
          fi

          git commit -m "Update feeds"
          git push
